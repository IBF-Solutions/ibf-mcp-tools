# IBF Personal Proxmox-Cluster Inventar
# Quelle: proxmox/CLAUDE.md (Stand 2026-05-05)
#
# Verwendung: morning-dashboard (projekte/dashboard/) verwendet diese Datei
# als Soll-Liste für die "VMs müssen laufen"-Prüfung.
#
# Felder pro Eintrag:
#   vmid:    Proxmox-VM/LXC-ID
#   name:    Name laut Cluster
#   role:    server | client | template | infra
#   label:   production | on-demand | debug   (default: production)
#   os:      linux | windows-server | windows-client | other
#   dmz:     true wenn IP in 10.10.10.0/24 (informativ)
#   note:    Freitext
#
# Soll-laufen-Logik fürs Dashboard:
#   role=server UND label=production  -> MUSS laufen, sonst ALERT
#   role=client                       -> nur informativ (online-Quote)
#   label=on-demand oder debug        -> kein Soll-Check
#   role=template                     -> kein Soll-Check
#
# Hinweis: Einträge mit "review:" im note-Feld sind aus CLAUDE.md
# automatisch übernommen, aber das angegebene Label ist eine Annahme --
# bitte beim Durchgehen verifizieren oder anpassen.

